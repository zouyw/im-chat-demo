<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM 即时通讯 - Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 600px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .chat-info h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .status {
            font-size: 13px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.incoming {
            justify-content: flex-start;
        }

        .message.outgoing {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .incoming .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 10px;
        }

        .outgoing .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-left: 10px;
            order: 1;
        }

        .message-content {
            max-width: 60%;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .incoming .message-bubble {
            background: white;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .outgoing .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        /* 输入区域 */
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            border: 2px solid #e2e8f0;
            border-radius: 24px;
            padding: 12px 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-input::placeholder {
            color: #a0aec0;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }

        .welcome-message h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #4a5568;
        }

        .welcome-message p {
            font-size: 14px;
        }

        /* 快捷回复 */
        .quick-replies {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding: 0 20px 20px;
        }

        .quick-reply-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #667eea;
            border-radius: 20px;
            color: #667eea;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-reply-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 头部 -->
        <div class="chat-header">
            <div class="avatar">🤖</div>
            <div class="chat-info">
                <h1>AI 智能助手</h1>
                <div class="status">
                    <span class="status-dot"></span>
                    在线 - 随时为您服务
                </div>
            </div>
        </div>

        <!-- 消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>👋 欢迎使用 IM 即时通讯</h2>
                <p>发送消息开始对话，或点击下方快捷回复</p>
            </div>
        </div>

        <!-- 快捷回复 -->
        <div class="quick-replies" id="quickReplies">
            <button class="quick-reply-btn" onclick="sendQuickReply('你好，介绍一下你自己')">👋 打招呼</button>
            <button class="quick-reply-btn" onclick="sendQuickReply('今天天气怎么样？')">🌤️ 问天气</button>
            <button class="quick-reply-btn" onclick="sendQuickReply('讲个笑话听听')">😄 讲笑话</button>
            <button class="quick-reply-btn" onclick="sendQuickReply('有什么推荐的美食吗？')">🍜 问美食</button>
        </div>

        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="messageInput" 
                    placeholder="输入消息..."
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 自动回复库
        const autoReplies = {
            '你好': '你好！很高兴见到你！有什么我可以帮助你的吗？😊',
            'hello': 'Hello! How can I help you today? 😊',
            '在吗': '我在的！随时为您服务，请问有什么事吗？',
            '天气': '今天天气不错哦！阳光明媚，适合出门活动～☀️',
            '笑话': '为什么程序员总是分不清万圣节和圣诞节？因为 Oct 31 == Dec 25！😄',
            '推荐': '我推荐你去尝尝附近的川菜，味道很正宗！🌶️',
            '谢谢': '不客气！有其他问题随时问我哦～',
            '再见': '再见！祝你有美好的一天！👋'
        };

        // 默认回复
        const defaultReplies = [
            '收到你的消息了！我正在思考如何回复你...🤔',
            '这个问题很有意思，让我想想...💭',
            '好的，我明白了！还有其他问题吗？',
            '感谢你的消息！我会认真考虑的～',
            '很有趣的观点！你是怎么想到的？'
        ];

        // 发送消息
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message) {
                // 添加用户消息
                addMessage(message, 'outgoing');
                input.value = '';
                
                // 隐藏欢迎消息和快捷回复
                hideWelcomeAndQuickReplies();
                
                // 模拟自动回复
                setTimeout(() => {
                    const reply = getAutoReply(message);
                    addMessage(reply, 'incoming');
                }, 1000 + Math.random() * 1000);
            }
        }

        // 获取自动回复
        function getAutoReply(message) {
            const lowerMessage = message.toLowerCase();
            
            for (const [key, reply] of Object.entries(autoReplies)) {
                if (lowerMessage.includes(key)) {
                    return reply;
                }
            }
            
            // 随机返回默认回复
            return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
        }

        // 快捷回复
        function sendQuickReply(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        // 添加消息到聊天
        function addMessage(text, type) {
            const messagesContainer = document.getElementById('chatMessages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const avatar = type === 'incoming' ? '🤖' : '👤';
            const time = new Date().toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div class="message-text">${escapeHtml(text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // 隐藏欢迎消息和快捷回复
        function hideWelcomeAndQuickReplies() {
            const welcome = document.querySelector('.welcome-message');
            const quickReplies = document.getElementById('quickReplies');
            
            if (welcome) welcome.style.display = 'none';
            if (quickReplies) quickReplies.style.display = 'none';
        }

        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载完成后的欢迎消息
        window.onload = function() {
            console.log('IM Chat Demo Loaded Successfully!');
        };
    </script>
</body>
</html>
